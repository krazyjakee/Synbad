version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      patch-and-minor:
        update-types: ["minor", "patch"]
    labels: ["dependencies", "rust"]
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "ci(deps)"
