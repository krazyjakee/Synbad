name: GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "site/**"
      - "docs/**"
      - "assets/logo.svg"
      - "assets/icon.svg"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          set -euo pipefail
          out=_site
          mkdir -p "$out/docs" "$out/assets"
          cp -r site/. "$out/"
          cp -r docs/.   "$out/docs/"
          cp assets/logo.svg assets/icon.svg "$out/assets/" 2>/dev/null || true
          # Lightweight no-build markdown rendering: index.html links to raw .md files
          # via GitHub's rendered URLs. For richer rendering, swap in mdBook or Zola later.

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
